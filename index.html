async function tryFetchJSON(url) {

async function fetchBestLap(transponder) {
  const acts = await tryFetchJSON("https://practice-api.speedhive.com/api/v1/chips/" + encodeURIComponent(transponder) + "/activities?count=5");
  const list = (acts && (acts.activities || acts.items || acts.data)) || (Array.isArray(acts) ? acts : []);

    "https://practice-api.speedhive.com/api/v1/chips/" + encodeURIComponent(chipCode) + "/locations/" + locId + "/sessions",
    "https://practice-api.speedhive.com/api/v1/chips/" + encodeURIComponent(chipCode) + "/activities/" + a0.id + "/sessions",

function getStandort() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }

      () => resolve(null),

  });
}

  fahrten: [],
  settings: {
    fv: { max: 12, gelb: 3 }, fg1: { max: 8, gelb: 2 },
    hl: { max: 5, gelb: 1 }, fl: { max: 5, gelb: 1 }, pl: { max: 5, gelb: 1 },
    kz: { max: 4, gelb: 1 },
  },
});

const KZ_DEFAULT = () => ({ reset: "2020-01-01", start: 0, note: "", checkedAt: 0 });
const normalizeData = (d) => {
  const base = seedData();
  const out = { ...base, ...d };
  out.settings = { ...base.settings, ...(d.settings || {}) };
  out.motoren = (d.motoren || []).map((m) => ({ ...m, kz: m.kz || KZ_DEFAULT() }));
  return out;
};

// ---------- Calculations ----------
const litersFor = (fahrten, field, id, resetDate) =>
  fahrten.filter((f) => f[field] === id && (!resetDate || f.datum >= resetDate))
    .reduce((s, f) => s + f.liter, 0);

const partStand = (fahrten, field, id, part) => part.start + litersFor(fahrten, field, id, part.reset);

const motorStands = (fahrten, m) => ({
  gesamt: partStand(fahrten, "motorId", m.id, m.motor),
  hl: partStand(fahrten, "motorId", m.id, m.hl),
  fl: partStand(fahrten, "motorId", m.id, m.fl),
  pl: partStand(fahrten, "motorId", m.id, m.pl),
  kz: partStand(fahrten, "motorId", m.id, m.kz || KZ_DEFAULT()),
});

const statusOf = (stand, cfg) => {
  const rest = cfg.max - stand;
  if (rest <= 0) return { key: "rot", label: "FÄLLIG", rest };
  if (rest <= cfg.gelb) return { key: "gelb", label: "BALD FÄLLIG", rest };
  return { key: "grün", label: "OK", rest };
};

const STATUS_STYLE = {
  "grün": { chip: "bg-emerald-500/15 text-emerald-300", bar: "bg-emerald-400" },
  "gelb": { chip: "bg-amber-400/15 text-amber-300", bar: "bg-amber-400" },
  "rot": { chip: "bg-red-500/20 text-red-300", bar: "bg-red-500" },
};

// ---------- Small components (stabil, außerhalb von App) ----------
function TankBar({ name, note, stand, cfg }) {
  const st = statusOf(stand, cfg);
  const pct = Math.max(0, Math.min(100, (st.rest / cfg.max) * 100));
  const sty = STATUS_STYLE[st.key];
  return (
    <div className="py-1.5">
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-xs font-semibold uppercase tracking-wide text-slate-300">
          {name}{note ? <span className="normal-case tracking-normal font-bold text-amber-200">{name ? " · " : ""}{note}</span> : null}
        </span>
        <span className="text-xs text-slate-400 tabular-nums">
          {fmt(stand)} / {fmt(cfg.max)} L · <span className={`px-1.5 py-0.5 rounded-full font-bold ${sty.chip}`}>{st.label}</span>
        </span>
      </div>
      <div className="h-3 rounded-full bg-slate-800 border border-slate-700/60 overflow-hidden">
        <div className={`h-full rounded-full ${sty.bar}`} style={{ width: `${pct}%`, transition: "width .4s" }} />
      </div>
    </div>
  );
}

function Card({ children, className = "" }) {
  return <div className={`bg-slate-900 rounded-2xl border border-slate-700/60 p-4 ${className}`}>{children}</div>;
}

function Field({ label, children }) {
  return (
    <label className="block mb-3">
      <span className="block text-xs font-semibold uppercase tracking-wide text-slate-400 mb-1">{label}</span>
      {children}
    </label>
  );
}

const inputCls = "w-full rounded-xl border border-slate-600 px-3 py-2.5 text-base bg-slate-800 text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-400";

function ConfirmButton({ label, confirmLabel, onConfirm, className }) {
  const [armed, setArmed] = useState(false);
  useEffect(() => {
    if (!armed) return;
    const t = setTimeout(() => setArmed(false), 4000);
    return () => clearTimeout(t);
  }, [armed]);
  return (
    <button onClick={() => { if (armed) { setArmed(false); onConfirm(); } else { setArmed(true); } }}
      className={`${className} ${armed ? "bg-red-600 text-white border-red-600" : ""}`}>
      {armed ? confirmLabel : label}
    </button>
  );
}

function PartEditor({ title, part, onChange, withNote, stand, cfg, pruefIntervall }) {
  const [open, setOpen] = useState(false);
  const history = part.history || [];
  const seitPruefung = pruefIntervall && stand !== undefined ? stand - (part.checkedAt || 0) : 0;
  const pruefungFaellig = pruefIntervall && seitPruefung >= pruefIntervall;
  return (
    <div className="border border-slate-700/60 rounded-xl p-3 mb-3">
      <div className="flex items-center justify-between mb-2">
        <span className="font-semibold text-slate-100">{title}</span>
        <button onClick={() => onChange({ ...part, reset: today(), start: 0, checkedAt: 0,
            history: [...history, { note: part.note || "", liter: stand !== undefined ? Math.round(stand * 10) / 10 : null, bis: today() }] })}
          className="text-xs font-bold text-amber-300 border border-amber-400 rounded-full px-3 py-1 active:bg-amber-400/10">Teil getauscht → 0</button>
      </div>
      {cfg && stand !== undefined && <TankBar name="" note={part.note} stand={stand} cfg={cfg} />}
      {pruefungFaellig && (
        <div className="bg-amber-400/10 border border-amber-400/40 rounded-xl p-2 my-2 flex items-center justify-between gap-2">
          <span className="text-xs font-semibold text-amber-200">🔍 {title} prüfen – {fmt(seitPruefung)} L seit letzter Prüfung</span>
          <button onClick={() => onChange({ ...part, checkedAt: stand })}
            className="shrink-0 text-xs font-bold rounded-full bg-amber-400 text-slate-950 px-3 py-1 active:bg-amber-300">Geprüft ✓</button>
        </div>
      )}
      <div className="grid grid-cols-2 gap-2">
        <label className="text-xs text-slate-400">Reset am
          <input type="date" className={`${inputCls} mt-1`} value={part.reset} onChange={(e) => onChange({ ...part, reset: e.target.value })} />
        </label>
        <label className="text-xs font-bold text-amber-300">Startwert [L]
          <input inputMode="decimal" className={`${inputCls} mt-1 font-bold`} defaultValue={String(part.start).replace(".", ",")}
            key={`${part.reset}-${title}`}
            onBlur={(e) => onChange({ ...part, start: parseNum(e.target.value) })} />
        </label>
      </div>
      {withNote && (
        <label className="block text-xs text-slate-400 mt-2">Notiz (z. B. Hersteller)
          <input className={`${inputCls} mt-1`} placeholder="z. B. O.S Lager" value={part.note || ""}
            onChange={(e) => onChange({ ...part, note: e.target.value })} />
        </label>
      )}
      {history.length > 0 && (
        <div className="mt-2">
          <button onClick={() => setOpen((v) => !v)} className="text-xs font-bold text-slate-300 active:text-amber-300">
            📜 Historie ({history.length}) {open ? "▲" : "▼"}
          </button>
          {open && (
            <div className="mt-1 space-y-1">
              {[...history].reverse().map((h, i) => (
                <div key={i} className="text-xs text-slate-400 tabular-nums border-l-2 border-slate-700 pl-2">
                  {h.note || "Ohne Notiz"} – {h.liter !== null && h.liter !== undefined ? `${fmt(h.liter)} L` : "? L"} · ausgebaut {fmtDate(h.bis)}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ---------- Screens ----------
function DashboardScreen({ autos, motoren, fahrten, settings, setTab, activeAutoId, up, fullData, doBackup }) {
  const activeAuto = autos.find((a) => a.id === activeAutoId) || autos[0] || null;
  const activeMotor = activeAuto ? motoren.find((m) => m.id === activeAuto.motorId) || null : null;
  const shownAutos = activeAuto ? [activeAuto] : [];
  const shownMotoren = activeMotor ? [activeMotor] : [];
  const bk = fullData.backup || {};
  const interval = bk.intervalDays === undefined ? 30 : bk.intervalDays;
  const changed = dataHash(fullData) !== (bk.hash || "");
  const daysSince = bk.lastBackupAt ? Math.floor((Date.now() - new Date(bk.lastBackupAt).getTime()) / 86400000) : null;
  const showReminder = interval > 0 && changed && (daysSince === null || daysSince >= interval);
  return (
    <div className="space-y-4">
      {showReminder && (
        <div className="bg-amber-400/10 border border-amber-400/40 rounded-2xl p-3 flex items-center justify-between gap-3">
          <span className="text-sm font-semibold text-amber-200">
            💾 {daysSince === null ? "Noch keine Sicherung erstellt" : `Letzte Sicherung vor ${daysSince} Tagen`} – jetzt sichern?
          </span>
          <button onClick={doBackup} className="shrink-0 rounded-xl bg-amber-400 text-slate-950 text-sm font-bold px-3 py-2 active:bg-amber-300">Jetzt sichern</button>
        </div>
      )}
      <div className="flex items-center justify-between">
        <h2 className="text-sm font-bold uppercase tracking-widest text-amber-400">Aktives Auto</h2>
        {autos.length > 1 && (
          <select className="rounded-xl border border-slate-600 px-2 py-1 text-sm bg-slate-800 text-slate-100" value={activeAuto?.id || ""}
            onChange={(e) => up({ activeAutoId: e.target.value })}>
            {autos.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        )}
      </div>
      {autos.length === 0 && (
        <Card className="text-sm text-slate-300">
          Noch kein Auto angelegt.{" "}
          <button onClick={() => setTab("autos")} className="font-bold text-amber-300 underline">Unter „Autos" anlegen →</button>
        </Card>
      )}
      {shownAutos.map((a) => {
        const motor = motoren.find((m) => m.id === a.motorId);
        const gesamt = a.startAuto + litersFor(fahrten, "autoId", a.id, null);
        return (
          <Card key={a.id}>
            <div className="flex items-baseline justify-between">
              <span className="text-xl font-extrabold text-slate-100">{a.name}</span>
              <span className="text-sm text-slate-400 tabular-nums">{fmt(gesamt)} L gesamt</span>
            </div>
            <div className="text-sm text-slate-400 mb-2">Motor: {motor ? motor.name : "–"}</div>
            <TankBar name="Freilauf Vorne" stand={partStand(fahrten, "autoId", a.id, a.fv)} cfg={settings.fv} />
            <TankBar name="Freilauf Gang 1" stand={partStand(fahrten, "autoId", a.id, a.fg1)} cfg={settings.fg1} />
          </Card>
        );
      })}
      <div className="flex items-center justify-between pt-2">
        <h2 className="text-sm font-bold uppercase tracking-widest text-amber-400">Motor im Auto</h2>
        {activeAuto && motoren.length > 0 && (
          <select className="rounded-xl border border-slate-600 px-2 py-1 text-sm bg-slate-800 text-slate-100" value={activeAuto.motorId || ""}
            onChange={(e) => up((d) => ({ autos: d.autos.map((a) => a.id === activeAuto.id ? { ...a, motorId: e.target.value } : a) }))}>
            <option value="">– kein Motor –</option>
            {motoren.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        )}
      </div>
      {shownMotoren.length === 0 && (
        <Card className="text-sm text-slate-300">
          {motoren.length === 0 ? (
            <>Noch kein Motor angelegt.{" "}
              <button onClick={() => setTab("motoren")} className="font-bold text-amber-300 underline">Jetzt anlegen →</button></>
          ) : (
            <>Kein Motor im aktiven Auto ausgewählt – wähle unter „Autos" beim Auto einen Motor aus.</>
          )}
        </Card>
      )}
      {shownMotoren.map((m) => {
        const s = motorStands(fahrten, m);
        const kz = m.kz || KZ_DEFAULT();
        const parts = [
          ["Hauptlager", s.hl, settings.hl, m.hl.note], ["Frontlager", s.fl, settings.fl, m.fl.note], ["Pleuel", s.pl, settings.pl, m.pl.note],
          ["Kerze", s.kz, settings.kz, kz.note],
        ];
        const kzCheck = s.kz - (kz.checkedAt || 0);
        const next = parts.map(([n, st, c]) => ({ n, ...statusOf(st, c) })).sort((a, b) => a.rest - b.rest)[0];
        return (
          <Card key={m.id}>
            <div className="flex items-baseline justify-between">
              <span className="text-lg font-extrabold text-slate-100">{m.name}</span>

            )}
            <div className="mt-2 text-sm font-semibold text-slate-200">
              {next.rest <= 0 ? "⚠️ JETZT fällig: " : "Nächste Wartung: "}{next.n}
              {next.rest > 0 ? ` in ${fmt(next.rest)} L` : ""}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function FahrtScreen({ autos, motoren, fahrten, up, setTab, activeAutoId }) {
  const [datum, setDatum] = useState(today());
  const [autoId, setAutoId] = useState(autos.find((a) => a.id === activeAutoId)?.id || autos[0]?.id || "");
  const auto = autos.find((a) => a.id === autoId);
  const [motorId, setMotorId] = useState(auto?.motorId || motoren[0]?.id || "");
  const [liter, setLiter] = useState("");
  const [notiz, setNotiz] = useState("");
  if (autos.length === 0 || motoren.length === 0) {
    return (
      <Card className="text-sm text-slate-300 space-y-2">
        <p className="font-bold text-slate-100">Bevor Du Fahrten eintragen kannst:</p>
        {motoren.length === 0 && <button onClick={() => setTab("motoren")} className="block font-bold text-amber-300 underline">1. Motor anlegen →</button>}
        {autos.length === 0 && <button onClick={() => setTab("autos")} className="block font-bold text-amber-300 underline">{motoren.length === 0 ? "2." : "1."} Auto anlegen →</button>}
      </Card>
    );
  }
  const add = () => {
    const l = parseNum(liter);
    if (!autoId || !motorId || l <= 0) return;
    up((d) => ({ fahrten: [...d.fahrten, { id: uid(), datum, autoId, motorId, liter: l, notiz }] }));
    setLiter(""); setNotiz("");
  };
  return (
    <div className="space-y-4">
      <Card>
        <h2 className="text-lg font-extrabold text-slate-100 mb-3">Fahrt eintragen</h2>
        <Field label="Datum"><input type="date" className={inputCls} value={datum} onChange={(e) => setDatum(e.target.value)} /></Field>
        <Field label="Auto">
          <select className={inputCls} value={autoId} onChange={(e) => { setAutoId(e.target.value); const a2 = autos.find((a) => a.id === e.target.value); if (a2?.motorId) setMotorId(a2.motorId); }}>
            {autos.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </Field>
        <Field label="Motor">
          <select className={inputCls} value={motorId} onChange={(e) => setMotorId(e.target.value)}>
            {motoren.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        </Field>
        <Field label="Laufleistung [L]">
          <input inputMode="decimal" placeholder="z. B. 0,5" className={inputCls} value={liter} onChange={(e) => setLiter(e.target.value)} />
        </Field>
        <div className="flex gap-2 mb-3">
          {[0.25, 0.5, 1].map((v) => (
            <button key={v} onClick={() => setLiter(String(parseNum(liter) + v).replace(".", ","))}
              className="flex-1 rounded-xl border border-slate-600 py-2 text-sm font-semibold text-slate-200 active:bg-slate-800">+{String(v).replace(".", ",")} L</button>
          ))}
        </div>
        <Field label="Notiz (optional)"><input className={inputCls} value={notiz} onChange={(e) => setNotiz(e.target.value)} /></Field>
        <button onClick={add} disabled={parseNum(liter) <= 0}
          className="w-full rounded-xl bg-amber-400 text-slate-950 font-bold py-3 disabled:opacity-40 active:bg-amber-300">Fahrt speichern</button>
      </Card>
      <h2 className="text-sm font-bold uppercase tracking-widest text-amber-400">Letzte Fahrten</h2>
      {fahrten.length === 0 && <Card className="text-sm text-slate-400">Noch keine Fahrten – trage oben Deine erste ein.</Card>}
      {[...fahrten].sort((a, b) => b.datum.localeCompare(a.datum)).slice(0, 20).map((f) => (
        <Card key={f.id} className="flex items-center justify-between py-3">
          <div>
            <div className="font-semibold text-slate-100 tabular-nums">{fmtDate(f.datum)} · {fmt(f.liter)} L</div>
            <div className="text-xs text-slate-400">
              {autos.find((a) => a.id === f.autoId)?.name || "?"} · {motoren.find((m) => m.id === f.motorId)?.name || "?"}{f.notiz ? ` · ${f.notiz}` : ""}
            </div>
          </div>
          <ConfirmButton label="Löschen" confirmLabel="Sicher?"
            onConfirm={() => up((d) => ({ fahrten: d.fahrten.filter((x) => x.id !== f.id) }))}
            className="text-red-400 text-sm font-semibold px-2 py-1 rounded-lg" />
        </Card>
      ))}
    </div>
  );
}

function MotorenScreen({ motoren, fahrten, settings, up, editMotorId, setEditMotorId, activeMotorId, autos }) {
  const motor = motoren.find((m) => m.id === editMotorId);
  const setMotor = (patch) => up((d) => ({ motoren: d.motoren.map((m) => (m.id === editMotorId ? { ...m, ...patch } : m)) }));
  const [lapMsg, setLapMsg] = useState("");
  const [lapBusy, setLapBusy] = useState(false);
  const [pendingLap, setPendingLap] = useState(null);
  const [manuellOffen, setManuellOffen] = useState(false);
  const [manZeit, setManZeit] = useState("");
  const [manDatum, setManDatum] = useState(today());
  const [manUhrzeit, setManUhrzeit] = useState(new Date().toTimeString().slice(0, 5));
  const montiertesAuto = motor ? autos.find((a) => a.motorId === motor.id) : null;
  const ermittleWetterUndSetzePending = async (zeit, datum, uhrzeit, ortHint) => {
    setLapMsg((ortHint ? "" : "") + "Ermittle deinen Standort für die Temperatur …");
    const standort = await getStandort();
    let temp = null;
    let ortName = ortHint || (montiertesAuto && montiertesAuto.ort) || "";
    if (standort) {
      temp = await fetchTemperaturVonKoordinaten(standort.lat, standort.lon, datum, uhrzeit);
      const rg = await reverseGeocode(standort.lat, standort.lon);
      if (rg) ortName = rg;
    } else if (montiertesAuto && montiertesAuto.ort) {
      temp = await fetchTemperature(montiertesAuto.ort, datum, uhrzeit);
    }
    setPendingLap({ zeit, datum, uhrzeit, ort: ortName, temperatur: temp });
    setLapMsg(temp === null ? "⚠️ Temperatur konnte nicht ermittelt werden (Standortzugriff erlaubt? evtl. zu aktuelles Datum)." : "");
    setLapBusy(false);
  };
  const holeBestzeit = async () => {
    if (!montiertesAuto || !montiertesAuto.transponder) {
      setLapMsg("Dieser Motor ist in keinem Auto mit Transponder-Nr. montiert (unter 'Autos' eintragen).");
      return;
    }
    setLapBusy(true);
    setLapMsg("Hole Bestzeit von Speedhive …");
    const res = await fetchBestLap(montiertesAuto.transponder);
    if (res.error) {
      setLapMsg("❌ Keine Zeit gefunden (" + res.error + "). Melde mir das kurz, dann passe ich die Abfrage an.");
      setLapBusy(false);
      return;
    }
    await ermittleWetterUndSetzePending(res.zeit, res.datum, res.uhrzeit, res.ort);
  };
  const uebernehmeManuell = async () => {
    if (!manZeit.trim()) { setLapMsg("Bitte zuerst eine Zeit eintragen."); return; }
    setManuellOffen(false);
    setLapBusy(true);
    setLapMsg("Übernehme manuelle Zeit …");
    await ermittleWetterUndSetzePending(manZeit.trim(), manDatum, manUhrzeit, null);
    setManZeit("");
  };
  const speichereGrip = (grip) => {
    if (!pendingLap) return;
    const entry = { id: uid(), ...pendingLap, grip };
    setMotor({ rundenzeiten: [...(motor.rundenzeiten || []), entry] });
    setPendingLap(null);
    setLapMsg("✓ Bestzeit gespeichert!");
    setTimeout(() => setLapMsg(""), 3000);
  };
  if (motor) {
    const s = motorStands(fahrten, motor);
    const rundenzeiten = motor.rundenzeiten || [];
    const sortiert = [...rundenzeiten].sort((a, b) => (parseLapSeconds(a.zeit) ?? 9e9) - (parseLapSeconds(b.zeit) ?? 9e9));
    return (
      <div className="space-y-4">
        <button onClick={() => setEditMotorId(null)} className="text-amber-300 font-semibold text-sm">← Zurück zur Liste</button>
        <Card>
          <Field label="Motor-Name">
            <input className={`${inputCls} font-extrabold`} value={motor.name} onChange={(e) => setMotor({ name: e.target.value })} />
          </Field>
          <div className="text-sm text-slate-300 mb-3 tabular-nums">Gesamt: {fmt(s.gesamt)} L · HL {fmt(s.hl)} L · FL {fmt(s.fl)} L · Pleuel {fmt(s.pl)} L</div>
          <PartEditor title="Motor gesamt" part={motor.motor} onChange={(p) => setMotor({ motor: p })} />
          <PartEditor title="Hauptlager" part={motor.hl} onChange={(p) => setMotor({ hl: p })} withNote stand={s.hl} cfg={settings.hl} />
          <PartEditor title="Frontlager" part={motor.fl} onChange={(p) => setMotor({ fl: p })} withNote stand={s.fl} cfg={settings.fl} />
          <PartEditor title="Pleuel" part={motor.pl} onChange={(p) => setMotor({ pl: p })} withNote stand={s.pl} cfg={settings.pl} />
          <PartEditor title="Kerze" part={motor.kz || KZ_DEFAULT()} onChange={(p) => setMotor({ kz: p })} withNote stand={s.kz} cfg={settings.kz} pruefIntervall={1} />
        </Card>
        <Card>
          <h3 className="font-bold text-slate-100 mb-3">Setup & Notizen</h3>
          {SPEC_FIELDS.map(([key, label]) => (
            <Field key={key} label={label}>
              <input className={inputCls} value={motor.specs[key] || ""} onChange={(e) => setMotor({ specs: { ...motor.specs, [key]: e.target.value } })} />
            </Field>
          ))}
          <Field label="Notizen"><textarea rows={2} className={inputCls} value={motor.notizen} onChange={(e) => setMotor({ notizen: e.target.value })} /></Field>
        </Card>
        <Card>
          <h3 className="font-bold text-slate-100 mb-3">🏆 Motor Auswertung</h3>
          <div className="grid grid-cols-2 gap-2 mb-2">

              <div>
                <div className={`text-sm font-bold tabular-nums ${i === 0 ? "text-amber-300" : "text-slate-100"}`}>{i === 0 ? "🏆 " : ""}{fmtLap(r.zeit)}</div>
                <div className="text-xs text-slate-400">{fmtDate(r.datum)} {r.uhrzeit} · {r.ort || "?"} · {r.temperatur !== null && r.temperatur !== undefined ? Math.round(r.temperatur) + "°C" : "–"} · Grip: {r.grip}</div>
              </div>
              <ConfirmButton label="✕" confirmLabel="Sicher?"
                onConfirm={() => setMotor({ rundenzeiten: rundenzeiten.filter((x) => x.id !== r.id) })}

  );
}

function RanglisteScreen({ motoren }) {
  const rangliste = motoren
    .map((m) => {
      const rz = m.rundenzeiten || [];
      const beste = rz.reduce((min, r) => {
        const s = parseLapSeconds(r.zeit);
        return s !== null && (min === null || s < min) ? s : min;
      }, null);
      return { m, ts: parseNum(m.topspeed), dz: parseNum(m.durchzug), beste };
    })
    .sort((a, b) => b.ts - a.ts || b.dz - a.dz);
  return (
    <div className="space-y-3">
      {rangliste.length === 0 && <Card className="text-sm text-slate-400">Noch keine Motoren angelegt.</Card>}
      {rangliste.map((r, i) => (
        <Card key={r.m.id} className="flex items-center gap-3">
          <span className={`w-9 h-9 rounded-full flex items-center justify-center font-extrabold ${i === 0 ? "bg-amber-400 text-slate-950" : "bg-slate-800 text-slate-300"}`}>{i + 1}</span>
          <div className="flex-1">
            <div className="font-bold text-slate-100">{r.m.name}</div>
            <div className="text-xs text-slate-400 tabular-nums">
              Topspeed {r.m.topspeed ? `${r.m.topspeed} km/h` : "–"} · Durchzug {r.m.durchzug ? `${r.m.durchzug} km/h` : "–"} · 🏁 {r.beste !== null ? fmtLap(String(r.beste)) : "–"}
            </div>
          </div>
        </Card>
      ))}
      <p className="text-xs text-slate-400 px-1">Sortiert nach Topspeed, dann Durchzug. Die Bestzeit (🏁) wird zusätzlich angezeigt, sobald Du im Motoren-Blatt eine Rundenzeit erfasst hast.</p>
    </div>
  );
}

function AutosScreen({ autos, motoren, fahrten, settings, up, activeAutoId, editAutoId, setEditAutoId }) {
  const auto = autos.find((a) => a.id === editAutoId);
  const setAuto = (patch) => up((d) => ({ autos: d.autos.map((a) => (a.id === editAutoId ? { ...a, ...patch } : a)) }));
  const [shTestMsg, setShTestMsg] = useState("");
  const [shTestBusy, setShTestBusy] = useState(false);
  const testSpeedhive = async () => {
    const tx = String((auto && auto.transponder) || "").trim();
    const act = String((auto && auto.activityId) || "").trim();
    if (!act) { setShTestMsg("Bitte zuerst die Aktivitäts-ID eintragen (Zahl aus der Speedhive-Adresse)."); return; }
    setShTestBusy(true);
    setShTestMsg("Diagnose läuft (das dauert ~20 Sekunden) …");
    const B = "https://practice-api.speedhive.com";
    const pfade = [
      ["1", B + "/api/v1/activities/" + act],
      ["2", B + "/api/v1/activities/" + act + "/sessions"],
      ["3", B + "/api/v1/training/activities/" + act],
      ["4", B + "/api/v1/training/activities/" + act + "/sessions"],
      ["5", B + "/api/v2/activities/" + act],
      ["6", B + "/api/v2/activities/" + act + "/sessions"],
      ["7", B + "/api/v1/sessions?activityId=" + act],
      ["8", B + "/api/v1/chips/" + tx + "/sessions"],
    ];
    const zeilen = [];
    for (const [nr, ziel] of pfade) {
      try {
        const r = await fetch("https://corsproxy.io/?url=" + encodeURIComponent(ziel), { headers: { Accept: "application/json" } });
        let extra = "";
        if (r.ok) {
          const t = await r.text();
          extra = " ✅ len=" + t.length + " » " + t.slice(0, 60).replace(/\s+/g, " ");
        }
        zeilen.push(nr + ": " + r.status + extra);
      } catch (e) {
        zeilen.push(nr + ": BLOCKIERT");
      }
    }
    setShTestMsg("DIAGNOSE v17 (bitte Foto schicken):\n" + zeilen.join("\n"));
    setShTestBusy(false);
  };
  if (auto) {
    const gesamt = auto.startAuto + litersFor(fahrten, "autoId", auto.id, null);
    const fvStand = partStand(fahrten, "autoId", auto.id, auto.fv);
    const fg1Stand = partStand(fahrten, "autoId", auto.id, auto.fg1);
    const isActive = auto.id === activeAutoId || (!activeAutoId && autos[0]?.id === auto.id);
    return (
      <div className="space-y-4">
        <button onClick={() => setEditAutoId(null)} className="text-amber-300 font-semibold text-sm">← Zurück zur Liste</button>
        <Card>
          <Field label="Auto-Name">
            <input className={`${inputCls} font-extrabold`} value={auto.name} onChange={(e) => setAuto({ name: e.target.value })} />
          </Field>
          <div className="mb-3 flex items-center justify-between">
            {isActive ? (
              <span className="text-xs font-bold px-2.5 py-1 rounded-full bg-emerald-500/15 text-emerald-300">✓ Aktiv im Dashboard</span>
            ) : (
              <button onClick={() => up({ activeAutoId: auto.id })}
                className="text-xs font-bold text-amber-300 border border-amber-400 rounded-full px-3 py-1 active:bg-amber-400/10">Als aktiv setzen</button>
            )}
            <span className="text-sm text-slate-400 tabular-nums">{fmt(gesamt)} L gesamt</span>
          </div>
          <Field label="Montierter Motor">
            <select className={inputCls} value={auto.motorId || ""} onChange={(e) => setAuto({ motorId: e.target.value })}>
              <option value="">– kein Motor –</option>
              {motoren.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
          </Field>
          <Field label="Transponder-Nr. (Speedhive)">
            <input inputMode="numeric" placeholder="z. B. 1234567" className={inputCls} value={auto.transponder || ""}
              onChange={(e) => setAuto({ transponder: e.target.value })} />
          </Field>
          <Field label="Aktivitäts-ID (Zahl aus speedhive.mylaps.com/practice/…/activity)">
            <input inputMode="numeric" placeholder="z. B. 8017814816" className={inputCls} value={auto.activityId || ""}
              onChange={(e) => setAuto({ activityId: e.target.value.replace(/\D/g, "") })} />
          </Field>
          <button onClick={testSpeedhive} disabled={shTestBusy}
            className="w-full rounded-xl border border-amber-400 text-amber-300 font-bold py-2 text-sm mb-2 active:bg-amber-400/10 disabled:opacity-40">🔬 Speedhive-Diagnose starten</button>
          {shTestMsg && <pre className="text-[10px] font-mono text-amber-200 mb-3 whitespace-pre-wrap break-all">{shTestMsg}</pre>}
          <PartEditor title="Freilauf Vorne" part={auto.fv} onChange={(p) => setAuto({ fv: p })} stand={fvStand} cfg={settings.fv} />
          <PartEditor title="Freilauf Gang 1" part={auto.fg1} onChange={(p) => setAuto({ fg1: p })} stand={fg1Stand} cfg={settings.fg1} />
        </Card>
        <ConfirmButton label="Auto löschen" confirmLabel="Wirklich löschen? Nochmal tippen"
          onConfirm={() => { up((d) => ({ autos: d.autos.filter((a) => a.id !== editAutoId) })); setEditAutoId(null); }}
          className="w-full rounded-xl border border-red-500/50 text-red-400 font-bold py-3" />
      </div>
    );
  }
  return (
    <div className="space-y-3">
      {autos.length === 0 && <Card className="text-sm text-slate-400">Noch kein Auto – lege unten Dein erstes an.</Card>}
      {autos.map((a) => {
        const isActive = a.id === activeAutoId || (!activeAutoId && autos[0]?.id === a.id);
        const gesamt = a.startAuto + litersFor(fahrten, "autoId", a.id, null);
        return (
          <Card key={a.id} className="flex items-center justify-between active:bg-slate-800">
            <button onClick={() => setEditAutoId(a.id)} className="flex-1 text-left">
              <div className="font-extrabold text-slate-100">{a.name}</div>
              <div className="text-xs text-slate-400 tabular-nums">{fmt(gesamt)} L gesamt · Motor: {motoren.find((m) => m.id === a.motorId)?.name || "–"}</div>
            </button>
            {isActive && <span className="text-xs font-bold px-2.5 py-1 rounded-full bg-emerald-500/15 text-emerald-300">Aktiv</span>}
          </Card>
        );
      })}
      <button onClick={() => { const id = uid(); up((d) => ({ activeAutoId: d.activeAutoId || id, autos: [...d.autos, { id, name: "Neues Auto", motorId: d.motoren[0]?.id || "", startAuto: 0, fv: { reset: today(), start: 0 }, fg1: { reset: today(), start: 0 } }] })); setEditAutoId(id); }}
        className="w-full rounded-xl bg-amber-400 text-slate-950 font-bold py-3">+ Auto hinzufügen</button>
    </div>
  );
}

function SettingsScreen({ autos, motoren, settings, up, onResetAll, activeAutoId, fullData, onRestore, doBackup }) {
  const [showBackup, setShowBackup] = useState(false);
  const [restoreText, setRestoreText] = useState("");
  const [backupMsg, setBackupMsg] = useState("");
  const backupString = JSON.stringify(fullData);
  const copyBackup = async () => {
    try {
      await navigator.clipboard.writeText(backupString);
      setBackupMsg("✓ In die Zwischenablage kopiert!");
    } catch {
      setBackupMsg("Kopieren nicht möglich – bitte Text unten manuell markieren und kopieren.");
    }
    setTimeout(() => setBackupMsg(""), 4000);
  };
  const [restoreArmed, setRestoreArmed] = useState(false);
  const doRestore = () => {
    const cleaned = restoreText.split(String.fromCharCode(96)).join("").trim();
    const startIdx = cleaned.indexOf("{");
    const endIdx = cleaned.lastIndexOf("}");
    if (!cleaned || startIdx === -1 || endIdx === -1) {
      setBackupMsg("Bitte zuerst den Sicherungstext in das Feld einfügen.");
      setTimeout(() => setBackupMsg(""), 4000);
      return;
    }
    try {
      const parsed = JSON.parse(cleaned.slice(startIdx, endIdx + 1));
      if (!parsed || !Array.isArray(parsed.autos) || !Array.isArray(parsed.motoren) || !Array.isArray(parsed.fahrten) || typeof parsed.settings !== "object") {
        throw new Error("ungültig");
      }
      if (!restoreArmed) {
        setRestoreArmed(true);
        setBackupMsg("⚠️ Sicherung gültig! Nochmal ‚Jetzt überschreiben' tippen zum Bestätigen.");
        setTimeout(() => { setBackupMsg(""); setRestoreArmed(false); }, 6000);
        return;
      }
      onRestore(parsed);
      setRestoreText("");
      setRestoreArmed(false);
      setBackupMsg("✓ Daten wiederhergestellt!");
      setTimeout(() => setBackupMsg(""), 4000);
    } catch {
      setRestoreArmed(false);
      setBackupMsg("Das sieht nicht wie eine gültige Sicherung aus – bitte den kompletten Text einfügen.");
      setTimeout(() => setBackupMsg(""), 5000);
    }
  };
  return (
    <div className="space-y-4">
      <Card>
        <h3 className="font-bold text-slate-100 mb-3">Maximalwerte & Warnungen</h3>
        {[["fv", "Freilauf Vorne"], ["fg1", "Freilauf Gang 1"], ["hl", "Hauptlager"], ["fl", "Frontlager"], ["pl", "Pleuel"], ["kz", "Kerze"]].map(([key, label]) => (
          <div key={key} className="grid grid-cols-3 gap-2 items-center mb-2">
            <span className="text-sm font-semibold text-slate-200">{label}</span>
            <label className="text-xs text-slate-400">Max [L]
              <input inputMode="decimal" className={`${inputCls} mt-1`} defaultValue={String(settings[key].max).replace(".", ",")}
                onBlur={(e) => up((d) => ({ settings: { ...d.settings, [key]: { ...d.settings[key], max: parseNum(e.target.value) } } }))} />
            </label>
            <label className="text-xs text-slate-400">Gelb ab Rest [L]
              <input inputMode="decimal" className={`${inputCls} mt-1`} defaultValue={String(settings[key].gelb).replace(".", ",")}
                onBlur={(e) => up((d) => ({ settings: { ...d.settings, [key]: { ...d.settings[key], gelb: parseNum(e.target.value) } } }))} />
            </label>
          </div>
        ))}
      </Card>
      <Card>
        <h3 className="font-bold text-slate-100 mb-2">Datensicherung</h3>
        {backupMsg && <p className="text-sm font-semibold text-amber-300 mb-2">{backupMsg}</p>}
        <button onClick={() => {
            const ok = doBackup();
            setBackupMsg(ok ? "✓ Sicherungsdatei heruntergeladen!" : "Download nicht möglich – nutze die Text-Sicherung unten.");
            setTimeout(() => setBackupMsg(""), 4000);
          }}
          className="w-full rounded-xl bg-amber-400 text-slate-950 font-bold py-3 mb-2 active:bg-amber-300">💾 Als Datei sichern</button>
        <Field label="Erinnerung an Sicherung">
          <select className={inputCls} value={String(fullData.backup && fullData.backup.intervalDays !== undefined ? fullData.backup.intervalDays : 30)}
            onChange={(e) => up((d) => ({ backup: { ...(d.backup || { lastBackupAt: null, hash: "" }), intervalDays: parseInt(e.target.value, 10) } }))}>
            <option value="7">Alle 7 Tage</option>
            <option value="30">Alle 30 Tage</option>
            <option value="90">Alle 90 Tage</option>
            <option value="0">Aus</option>
          </select>
        </Field>
        <div className="flex gap-2 mb-3">
          <button onClick={() => { setShowBackup((v) => !v); copyBackup(); }}
            className="flex-1 rounded-xl border border-amber-400 text-amber-300 font-bold py-2 text-sm active:bg-amber-400/10">Als Text kopieren</button>
        </div>
        {showBackup && (
          <label className="block mb-4 text-xs text-slate-400">Deine Sicherung (Text aufbewahren, z. B. in Notizen einfügen):
            <textarea readOnly rows={4} className={`${inputCls} mt-1 text-xs`} value={backupString}
              onFocus={(e) => e.target.select()} />
          </label>
        )}
        <label className="block mb-2">
          <input type="file" accept="application/json,.json,.txt" className="hidden"
            onChange={(e) => {
              const file = e.target.files && e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = () => {
                setRestoreText(String(reader.result || ""));
                setBackupMsg("✓ Datei geladen – jetzt unten ‚Wiederherstellen' tippen.");
                setTimeout(() => setBackupMsg(""), 5000);
              };
              reader.readAsText(file);
              e.target.value = "";
            }} />
          <span className="block w-full text-center rounded-xl border border-amber-400 text-amber-300 font-bold py-2 text-sm active:bg-amber-400/10">📂 Sicherungsdatei auswählen</span>
        </label>
        <label className="block text-xs text-slate-400">Oder gesicherten Text hier einfügen:
          <textarea rows={3} className={`${inputCls} mt-1 text-xs`} value={restoreText} placeholder='{"activeAutoId":...}'
            onChange={(e) => setRestoreText(e.target.value)} />
        </label>
        <button onClick={doRestore}
          className={`w-full rounded-xl font-bold py-3 mt-2 ${restoreArmed ? "bg-red-600 text-white" : "border border-amber-400 text-amber-300 active:bg-amber-400/10"}`}>
          {restoreArmed ? "Jetzt überschreiben" : "Wiederherstellen"}</button>
      </Card>
      <ConfirmButton label="Alle Daten zurücksetzen" confirmLabel="Wirklich ALLES löschen? Nochmal tippen"
        onConfirm={onResetAll}
        className="w-full rounded-xl border border-red-500/50 text-red-400 font-bold py-3" />
    </div>
  );
}

// ---------- Main App ----------
function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("start");
  const [editMotorId, setEditMotorId] = useState(null);
  const [editAutoId, setEditAutoId] = useState(null);
  const [saveState, setSaveState] = useState("");
  const saveTimer = useRef(null);
  const loaded = useRef(false);

  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem("vg8-data");
        setData(raw ? normalizeData(JSON.parse(raw)) : seedData());
      } catch {
        setData(seedData());
      }
      loaded.current = true;
    })();
  }, []);

  useEffect(() => {
    if (!data || !loaded.current) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        localStorage.setItem("vg8-data", JSON.stringify(data));
        setSaveState("Gespeichert");
        setTimeout(() => setSaveState(""), 1500);
      } catch {
        setSaveState("Speichern fehlgeschlagen");
      }
    }, 500);
  }, [data]);

  if (!data) {
    return <div className="min-h-screen flex items-center justify-center bg-slate-950 text-slate-400">Lade Daten…</div>;
  }

  const { autos, motoren, fahrten, settings } = data;
  // up akzeptiert ein Objekt ODER eine Funktion (d) => patch – immer auf aktuellem Stand
  const up = (patch) => setData((d) => ({ ...d, ...(typeof patch === "function" ? patch(d) : patch) }));

  const doBackup = () => {
    try {
      const json = JSON.stringify(data);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "nitro-service-backup-" + today() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      up((d) => ({ backup: { intervalDays: d.backup && d.backup.intervalDays !== undefined ? d.backup.intervalDays : 30, lastBackupAt: new Date().toISOString(), hash: dataHash(d) } }));
      return true;
    } catch {
      return false;
    }
  };

  const tabs = [
    ["start", "Start", "📊"], ["fahrt", "Fahrt", "⛽"], ["autos", "Autos", "🚗"], ["motoren", "Motoren", "🔧"],
    ["rang", "Rangliste", "🏁"], ["mehr", "Mehr", "⚙️"],
  ];

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100" style={{ fontFamily: "ui-sans-serif, -apple-system, system-ui, sans-serif", colorScheme: "dark" }}>
      <header className="sticky top-0 z-10 bg-gradient-to-r from-slate-950 via-blue-950 to-slate-950 border-b-2 border-amber-400 text-white px-4 py-3 flex items-baseline justify-between">
        <h1 className="font-extrabold uppercase italic tracking-wider text-lg flex items-center gap-2">🏁 Nitro Service <span className="text-xs font-bold bg-amber-400 text-slate-900 rounded-full px-2 py-0.5 not-italic">v17</span></h1>
        <span className="text-xs text-amber-300">{saveState}</span>
      </header>
      <main className="max-w-md mx-auto px-4 py-4 pb-28">
        {tab === "start" && <DashboardScreen autos={autos} motoren={motoren} fahrten={fahrten} settings={settings} setTab={setTab} activeAutoId={data.activeAutoId} up={up} fullData={data} doBackup={doBackup} />}
        {tab === "fahrt" && <FahrtScreen autos={autos} motoren={motoren} fahrten={fahrten} up={up} setTab={setTab} activeAutoId={data.activeAutoId} />}
        {tab === "autos" && <AutosScreen autos={autos} motoren={motoren} fahrten={fahrten} settings={settings} up={up} activeAutoId={data.activeAutoId} editAutoId={editAutoId} setEditAutoId={setEditAutoId} />}
        {tab === "motoren" && <MotorenScreen motoren={motoren} fahrten={fahrten} settings={settings} up={up} editMotorId={editMotorId} setEditMotorId={setEditMotorId}
          activeMotorId={(autos.find((a) => a.id === data.activeAutoId) || autos[0])?.motorId || null} autos={autos} />}
        {tab === "rang" && <RanglisteScreen motoren={motoren} />}
        {tab === "mehr" && <SettingsScreen autos={autos} motoren={motoren} settings={settings} up={up} activeAutoId={data.activeAutoId}
          fullData={data} onRestore={(d) => setData(normalizeData(d))} doBackup={doBackup}
          onResetAll={() => setData(seedData())} />}
      </main>
      <nav className="fixed bottom-0 inset-x-0 bg-slate-900 border-t border-slate-700/60 flex justify-around" style={{ paddingBottom: "env(safe-area-inset-bottom)" }}>
        {tabs.map(([key, label, icon]) => (
          <button key={key} onClick={() => { setTab(key); if (key !== "motoren") setEditMotorId(null); if (key !== "autos") setEditAutoId(null); }}
            className={`flex flex-col items-center py-2 px-2 text-xs font-semibold ${tab === key ? "text-amber-300" : "text-slate-400"}`}>
            <span className="text-xl leading-none mb-0.5">{icon}</span>{label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
